<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Prove webextension being wiped out</title>
		<script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
	</head>
	<body>
		<button id="download-from-getFileAsync">Download from getFileAsync()</button>

		<div id="status"></div>

		<script>
			Office.initialize = function() {
				const status = document.getElementById('status');

				function getSlice(file, sliceIndex) {
					return new Promise((resolve, reject) => {
						file.getSliceAsync(sliceIndex, result => {
							if (result.status === Office.AsyncResultStatus.Succeeded) {
								resolve(result.value.data);
							} else {
								reject(`getSliceAsync error, sliceIndex: ${sliceIndex}`);
							}
						});
					});
				}

			function downloadFile(base64Data) {
				status.textContent = 'Preparing download...';
				fetch('https://localhost:3008/upload', {
					method: 'POST',
					body: base64Data
				}).then(res => {
					if (res.ok) {
						status.textContent = 'Download started.';
						Office.context.ui.openBrowserWindow('https://localhost:3008/download');
					} else {
						status.textContent = 'Upload failed.';
					}
				}).catch(err => {
					status.textContent = 'Error: ' + err.message;
				});
			}

							document.getElementById('download-from-getFileAsync').addEventListener('click', () => {
					Office.context.document.getFileAsync(Office.FileType.Compressed, { sliceSize: 65536 }, async result => {
						if (result.status === Office.AsyncResultStatus.Succeeded) {
							const file = result.value;
							const slices = [];

							try {
								for (let sliceIndex = 0; sliceIndex < file.sliceCount; sliceIndex++) {
									slices.push(await getSlice(file, sliceIndex));
								}
							} catch (error) {
								status.textContent = error;
							} finally {
								file.closeAsync();
							}

							const data = [].concat(...slices);
							const base64Data = btoa(data.reduce((res, i) => res + String.fromCharCode(i), ''));

							console.log("******** base64Data:");
							console.log(base64Data);

							downloadFile(base64Data);
						} else {
							status.textContent = result.error.message;
						}
					});
				});
			};
		</script>
	</body>
</html>
